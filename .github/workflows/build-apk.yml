name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flet folium requests mysql-connector-python Pillow
    
- name: Build APK
  run: |
    flet build apk --output YugraTour --no-ios -y
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YugraTour
        path: build/apk/*.apk
