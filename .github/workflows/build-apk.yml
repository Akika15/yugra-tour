name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install flet
        pip install folium
        pip install requests
        pip install mysql-connector-python
        pip install Pillow
    
    - name: Build APK
      run: |
        echo "y" | flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YugraTour
        path: build/apk/*.apk
