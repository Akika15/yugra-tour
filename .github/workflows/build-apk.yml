name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flet folium requests mysql-connector-python Pillow
    
    - name: Build APK
      run: |
        echo "y" | flet build apk
    
    - name: List files (debug)
      run: |
        ls -la build/apk/ || echo "No APK found"
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YugraTour
        path: build/apk/*.apk
